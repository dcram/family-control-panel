name: CI

on:
  pull_request:
    branches: [main]

jobs:
  backend:
    name: Backend — lint + tests
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: fcp
          POSTGRES_PASSWORD: fcp
          POSTGRES_DB: fcp_test
        options: >-
          --health-cmd "pg_isready -U fcp"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
        ports:
          - 5432:5432

    env:
      DATABASE_URL: postgresql://fcp:fcp@localhost:5432/fcp
      SECRET_KEY: ci-secret-key-not-used-in-prod
      ENVIRONMENT: development

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          version: "10.32.1"

      - name: Install dependencies
        run: cd backend && uv sync --group dev

      - name: Lint (mypy + black)
        run: |
          cd backend
          uv run mypy app
          uv run black --check app

      - name: Tests
        run: cd backend && uv run pytest

  frontend:
    name: Frontend — lint + build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: latest

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: frontend/pnpm-lock.yaml

      - name: Install dependencies
        run: cd frontend && pnpm install

      - name: Lint
        run: cd frontend && pnpm lint

      - name: Build
        run: cd frontend && pnpm build
