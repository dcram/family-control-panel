services:
  db:
    image: postgres:16
    environment:
      POSTGRES_USER: fcp
      POSTGRES_PASSWORD: fcp
      POSTGRES_DB: fcp
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U fcp"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
